<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <!-- Background Layer for Premium Whitespace Context -->
  <rect width="800" height="800" fill="#FFFFFF" />

  <!-- Central Infrastructure Group -->
  <g id="Take-Profit-Logo-Core">
    
    <!-- Stable Foundation: Narrower Triangle with Enhanced Visual Weight and Smooth Vertices -->
    <polygon 
      points="400,502 330,610 470,610" 
      fill="#000000" 
      stroke="#000000" 
      stroke-width="24" 
      stroke-linejoin="round" 
    />
    
    <!-- Dynamic Leverage Group: Rotated uniformly around the Central Axis Point -->
    <g transform="rotate(-12, 400, 486)">
      
      <!-- Extended Leverage Beam: Stabilized and lengthened to support the market capacity -->
      <rect 
        x="80" 
        y="470" 
        width="640" 
        height="32" 
        rx="16" 
        ry="16" 
        fill="#000000" 
      />
      
      <!-- Trader Weight: Minimalist Small Circle representing the Individual Trader -->
      <circle 
        cx="125" 
        cy="446" 
        r="24" 
        fill="#000000" 
      />
      
      <!-- Market Weight: Large Circle lifted by 4 pixels to introduce refined breathing room -->
      <circle 
        cx="600" 
        cy="371" 
        r="95" 
        fill="#000000" 
      />
      
    </g>
  </g>
</svg>
