<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Profit | Waitlist</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* CSS Reset and Core Theme Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Layout Structure */
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            margin-bottom: 2.5rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .logo span {
            display: block;
            color: #c7a252;
        }

        /* Typography and Copywriting Elements */
        .section-text {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #8c8c8c;
            text-align: center;
            margin: 1.5rem 0;
        }

        .floor-label {
            color: #c7a252;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-bottom: 1px dashed #c7a252;
            padding-bottom: 0.25rem;
            display: inline-block;
            margin-bottom: 1rem;
        }

        /* 2D Canvas SVG Component */
        .chart-svg-container {
            width: 100%;
            height: 200px;
            margin-bottom: 2rem;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        /* 3D Scene Canvas Container */
        #chart3DStage {
            width: 100%;
            height: 280px;
            margin: 2rem 0;
            position: relative;
        }

        /* Interactive Form Framework */
        form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            background: #121212;
            padding: 1.75rem;
            border-radius: 8px;
            border: 1px solid #1f1f1f;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #a3a3a3;
        }

        input, select {
            background: #1c1c1c;
            border: 1px solid #2e2e2e;
            color: #ffffff;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            font-size: 0.95rem;
            width: 100%;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input:focus, select:focus {
            border-color: #c7a252;
        }

        .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: 0.25rem;
        }

        .radio-option {
            position: relative;
        }

        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .radio-label {
            display: block;
            text-align: center;
            background: #1c1c1c;
            border: 1px solid #2e2e2e;
            padding: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .radio-option input[type="radio"]:checked + .radio-label {
            border-color: #c7a252;
            color: #c7a252;
            background: rgba(199, 162, 82, 0.05);
        }

        /* Action Controls */
        button {
            background: #c7a252;
            color: #0b0b0b;
            border: none;
            padding: 0.85rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: background 0.2s ease;
            margin-top: 0.5rem;
        }

        button:hover {
            background: #dbb763;
        }

        button:disabled {
            background: #4a422e;
            color: #8c8c8c;
            cursor: not-allowed;
        }

        /* System Messages and Feedback Loop */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 0.85rem;
            text-align: center;
        }

        .hint-text {
            font-size: 0.85rem;
            color: #a3a3a3;
            text-align: center;
        }

        .resend-link {
            color: #c7a252;
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
            font-weight: normal;
            font-size: 0.85rem;
            display: inline;
            margin: 0;
            padding: 0;
        }

        /* Secure Client Dashboard Layout */
        .dashboard-card {
            background: #121212;
            border: 1px solid #1f1f1f;
            padding: 2rem;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .welcome-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .status-badge-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1c1c1c;
            padding: 0.75rem 1rem;
            border-radius: 4px;
        }

        .pill {
            background: #2e2e2e;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .share-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        /* Control Utilities */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header>
            <div class="logo">Take<span>Profit</span></div>
        </header>

        <main>
            <div class="chart-svg-container">
                <span class="floor-label">Protected Floor</span>
                <svg viewBox="0 0 760 200" preserveAspectRatio="xMidYMid meet">
                    <path id="chartPath" stroke="#c7a252" stroke-width="2.5" fill="none" />
                    <circle id="chartDot" r="5" fill="#ffffff" stroke="#c7a252" stroke-width="2" />
                </svg>
            </div>

            <p class="section-text">The drawdown happens. The floor holds. The account continues.</p>

            <div id="chart3DStage"></div>

            <p class="section-text">Live market volatility, rendered in three dimensions.</p>

            <form id="stepForm">
                <div id="step1Error" class="error-message hidden"></div>
                
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="John Doe" required />
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required />
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number (Optional)</label>
                    <input type="tel" id="phone" placeholder="+1 (555) 000-0000" />
                </div>

                <div class="form-group">
                    <label for="country">Country</label>
                    <select id="country" required>
                        <option value="" disabled selected>Select your location</option>
                        <option value="US">United States</option>
                        <option value="GB">United Kingdom</option>
                        <option value="CA">Canada</option>
                        <option value="AU">Australia</option>
                        <option value="NG">Nigeria</option>
                        <option value="ZA">South Africa</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Your Role</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="roleTrader" name="role" value="trader" checked />
                            <label for="roleTrader" class="radio-label">Trader</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="rolePartner" name="role" value="partner" />
                            <label for="rolePartner" class="radio-label">Partner</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="referralCode">Referral Code</label>
                    <input type="text" id="referralCode" placeholder="Optional" />
                </div>

                <button type="submit" id="submitStep1">Continue</button>
            </form>

            <form id="stepOtp" class="hidden">
                <div id="otpError" class="error-message hidden"></div>
                <p id="otpHint" class="hint-text"></p>
                
                <div class="form-group">
                    <label for="otpCode">Verification Code</label>
                    <input type="text" id="otpCode" placeholder="6-digit token" maxlength="6" required />
                </div>

                <button type="submit" id="submitOtp">Verify Token</button>
                <p class="hint-text">No message received? <button type="button" id="resendOtp" class="resend-link">Resend token</button></p>
            </form>

            <div id="dashboard" class="dashboard-card hidden">
                <h2 id="dashWelcome" class="welcome-title">Welcome!</h2>
                
                <div class="status-badge-container">
                    <span>Account Status</span>
                    <span id="statusPill" class="pill">PENDING</span>
                </div>

                <div class="share-container">
                    <label>Your Referral Code</label>
                    <div id="dashRefCode" style="font-size: 1.25rem; font-weight: 700; color: #c7a252; letter-spacing: 0.05em;"></div>
                </div>

                <div class="share-container">
                    <label>Your Unique Invite Link</label>
                    <input type="text" id="dashRefLink" readonly onclick="this.select();" />
                </div>
            </div>
        </main>

    </div>

    <script>
        // ==========================================
        // 1. GLOBAL CONFIGURATION & INITIALIZATION
        // ==========================================
        const SUPABASE_URL = "YOUR_SUPABASE_PROJECT_URL";
        const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

        if (typeof window.supabase === 'undefined') {
            console.warn("Supabase core modules missing from runtime path environment layer.");
        }

        const supabase = (SUPABASE_URL.startsWith("YOUR_") || typeof window.supabase === 'undefined') 
            ? null 
            : window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==========================================
        // 2. TWO-DIMENSIONAL CHART ENGINE
        // ==========================================
        function initChart2D() {
            const path = document.getElementById('chartPath');
            const dot = document.getElementById('chartDot');
            if (!path || !dot) return;

            try {
                const points = [
                    [0, 150], [80, 128], [150, 140], [230, 96], 
                    [300, 118], [340, 176], [365, 179], [400, 150], 
                    [470, 104], [560, 118], [650, 70], [760, 54]
                ];
                
                const pathData = points.map((p, i) => (i === 0 ? 'M' : 'L') + p[0] + ',' + p[1]).join(' ');
                path.setAttribute('d', pathData);
                
                let length = path.getTotalLength();
                if (length === 0) { 
                    length = 900; 
                }
                
                path.style.strokeDasharray = length;
                path.style.strokeDashoffset = length;
                
                let startTime = null;
                
                function animateChart(ts) {
                    try {
                        if (!startTime) startTime = ts;
                        const progress = Math.min((ts - startTime) / 2600, 1);
                        const eased = 1 - Math.pow(1 - progress, 3);
                        
                        path.style.strokeDashoffset = length * (1 - eased);
                        
                        if (length > 0) {
                            const p = path.getPointAtLength(length * eased);
                            if (p) {
                                dot.setAttribute('cx', p.x);
                                dot.setAttribute('cy', p.y);
                            }
                        }
                        
                        if (progress < 1) {
                            requestAnimationFrame(animateChart);
                        }
                    } catch (frameErr) {
                        console.error("Asynchronous execution fault inside 2D pipeline loop context:", frameErr);
                    }
                }
                
                requestAnimationFrame(animateChart);
            } catch (err) {
                console.error("2D graphic interface vector track configuration failure instance:", err);
            }
        }

        // ==========================================
        // 3. THREE-DIMENSIONAL MARKET PULSE ENGINE
        // ==========================================
        function initMarket3D() {
            const container = document.getElementById('chart3DStage');
            if (!container || typeof THREE === 'undefined') {
                console.warn("Three.js package vector definitions missing from runtime engine landscape.");
                return;
            }

            try {
                const scene = new THREE.Scene();
                
                let width = container.clientWidth || 430;
                let height = container.clientHeight || 280;
                
                const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);
                camera.position.set(0, 5.5, 13);
                camera.lookAt(0, 0, 0);
                
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(width, height);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(renderer.domElement);
                
                scene.add(new THREE.AmbientLight(0xffffff, 0.4));
                
                const dirLight = new THREE.DirectionalLight(0xC7A252, 1.2);
                dirLight.position.set(6, 10, 8);
                scene.add(dirLight);
                
                const fillLight = new THREE.DirectionalLight(0xffffff, 0.25);
                fillLight.position.set(-6, 4, -6);
                scene.add(fillLight);
                
                const barCount = 18;
                const spacing = 0.8;
                const startX = -((barCount - 1) * spacing) / 2;
                const bars = [];
                
                for (let i = 0; i < barCount; i++) {
                    const geo = new THREE.BoxGeometry(0.42, 1, 0.42);
                    const warmth = i / barCount;
                    const color = new THREE.Color().setHSL(0.11, 0.55, 0.28 + warmth * 0.32);
                    const mat = new THREE.MeshStandardMaterial({ color, metalness: 0.35, roughness: 0.45 });
                    const bar = new THREE.Mesh(geo, mat);
                    
                    bar.position.x = startX + i * spacing;
                    scene.add(bar);
                    
                    bars.push({
                        mesh: bar,
                        phase: Math.random() * Math.PI * 2,
                        speed: 0.6 + Math.random() * 0.8
                    });
                }
                
                function resize3D() {
                    const w = container.clientWidth;
                    const h = container.clientHeight;
                    if (w === 0 || h === 0) return;
                    camera.aspect = w / h;
                    camera.updateProjectionMatrix();
                    renderer.setSize(w, h);
                }
                
                window.addEventListener('resize', resize3D);
                
                let t = 0;
                function animate3D() {
                    try {
                        requestAnimationFrame(animate3D);
                        t += 0.016;
                        
                        bars.forEach((b) => {
                            const dynamicHeight = 1.1 + Math.sin(t * b.speed + b.phase) * 1.3 + 0.6;
                            b.mesh.scale.y = Math.max(0.25, dynamicHeight);
                            b.mesh.position.y = (b.mesh.scale.y) / 2;
                        });
                        
                        scene.rotation.y = Math.sin(t * 0.12) * 0.25;
                        renderer.render(scene, camera);
                    } catch (animErr) {
                        console.error("Asynchronous context crash inside 3D rendering loop cycle matrix:", animErr);
                    }
                }
                
                animate3D();
            } catch (err) {
                console.error("3D pipeline rendering scene configuration failure trace:", err);
            }
        }

        // ==========================================
        // 4. LIFECYCLE INITIALIZATION BINDING
        // ==========================================
        window.addEventListener('load', () => {
            initChart2D();
            initMarket3D();
        });

        // ==========================================
        // 5. REGISTRATION AND WAITLIST LOGIC
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const refFromUrl = urlParams.get('ref');

        if (refFromUrl) {
            const refInput = document.getElementById('referralCode');
            if (refInput) refInput.value = refFromUrl;
        }

        function generateReferralCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = 'TP-';
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        let pendingSignup = null;

        const stepForm = document.getElementById('stepForm');
        const stepOtp = document.getElementById('stepOtp');
        const dashboard = document.getElementById('dashboard');
        const step1Error = document.getElementById('step1Error');
        const otpError = document.getElementById('otpError');

        function showError(el, msg) {
            if (!el) return;
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        // Error message removal utility
        function clearError(el) {
            if (!el) return;
            el.textContent = '';
            el.classList.add('hidden');
        }

        if (stepForm) {
            stepForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                clearError(step1Error);
                
                const fullName = document.getElementById('fullName')?.value.trim();
                const email = document.getElementById('email')?.value.trim().toLowerCase();
                const phone = document.getElementById('phone')?.value.trim();
                const country = document.getElementById('country')?.value;
                const role = document.querySelector('input[name="role"]:checked')?.value;
                const referredBy = document.getElementById('referralCode')?.value.trim() || null;
                
                if (!fullName || !email || !country) {
                    showError(step1Error, "Please complete your full identity specifications map.");
                    return;
                }
                
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(email)) {
                    showError(step1Error, "Provided email address layout layout structure contains formats unrecognized by engine constraints.");
                    return;
                }
                
                if (!supabase) {
                    showError(step1Error, "Backend infrastructure matrix connection reference missing from architecture boundaries.");
                    return;
                }
                
                const btn = document.getElementById('submitStep1');
                if (btn) {
                    btn.disabled = true;
                    btn.textContent = 'Transmitting Token...';
                }
                
                pendingSignup = { fullName, email, phone, country, role, referredBy };
                
                const { error } = await supabase.auth.signInWithOtp({ 
                    email, 
                    options: { shouldCreateUser: true } 
                });
                
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = 'Continue';
                }
                
                if (error) {
                    showError(step1Error, error.message);
                    return;
                }
                
                const hint = document.getElementById('otpHint');
                if (hint) hint.textContent = "Enter the authentication code sent to your explicit routing profile: " + email;
                
                stepForm.classList.add('hidden');
                if (stepOtp) stepOtp.classList.remove('hidden');
            });
        }

        if (stepOtp) {
            stepOtp.addEventListener('submit', async function(e) {
                e.preventDefault();
                clearError(otpError);
                
                if (!pendingSignup) return;
                if (!supabase) {
                    showError(otpError, "Data connection layer reference unestablished inside window engine context.");
                    return;
                }
                
                const code = document.getElementById('otpCode')?.value.trim();
                const btn = document.getElementById('submitOtp');
                
                if (btn) {
                    btn.disabled = true;
                    btn.textContent = 'Processing Validation Token...';
                }
                
                const { data, error } = await supabase.auth.verifyOtp({
                    email: pendingSignup.email,
                    token: code,
                    type: 'email'
                });
                
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = 'Verify Token';
                }
                
                if (error) {
                    showError(otpError, error.message);
                    return;
                }
                
                const userId = data.user.id;
                const constRefCode = generateReferralCode();
                
                try {
                    const { error: upsertError } = await supabase.from('users').upsert({
                        id: userId,
                        full_name: pendingSignup.fullName,
                        email: pendingSignup.email,
                        phone: pendingSignup.phone,
                        country: pendingSignup.country,
                        role: pendingSignup.role,
                        referral_code: constRefCode,
                        referred_by: pendingSignup.referredBy || null,
                        status: 'pending_activation',
                        email_verified: true
                    });
                    
                    if (upsertError) {
                        showError(otpError, upsertError.message);
                        return;
                    }
                    
                    await loadDashboard(userId, constRefCode);
                } catch (err) {
                    console.error("Database connection failure exception trace:", err);
                }
            });
        }

        const resendBtn = document.getElementById('resendOtp');
        if (resendBtn) {
            resendBtn.addEventListener('click', async function() {
                if (!pendingSignup || !supabase) {
                    showError(otpError, "Infrastructure engine tracking missing system references.");
                    return;
                }
                await supabase.auth.signInWithOtp({
                    email: pendingSignup.email,
                    options: { shouldCreateUser: true }
                });
                const hint = document.getElementById('otpHint');
                if (hint) hint.textContent = 'A fresh validation token sequence has been issued to target profile path.';
            });
        }

        // ==========================================
        // 6. DASHBOARD GENERATION & RENDERING
        // ==========================================
        async function loadDashboard(userId, fallbackCode) {
            if (stepOtp) stepOtp.classList.add('hidden');
            if (dashboard) dashboard.classList.remove('hidden');
            
            let profile = null;
            try {
                const { data } = await supabase.from('users').select('*').eq('id', userId).single();
                profile = data;
            } catch (err) {
                console.error("Database parsing exceptions encountered, processing fallback engine state context:", err);
            }
            
            const referralCode = profile?.referral_code || fallbackCode;
            const nameTarget = profile?.full_name || pendingSignup?.fullName || "User";
            
            const dashWelcome = document.getElementById('dashWelcome');
            if (dashWelcome) {
                dashWelcome.textContent = "Welcome, " + nameTarget.split(' ')[0] + "!";
            }
            
            const dashRefCode = document.getElementById('dashRefCode');
            if (dashRefCode) dashRefCode.textContent = referralCode;
            
            const dashRefLink = document.getElementById('dashRefLink');
            if (dashRefLink) {
                dashRefLink.value = window.location.origin + window.location.pathname + '?ref=' + referralCode;
            }
            
            const status = profile?.status || 'pending_activation';
            const statusPill = document.getElementById('statusPill');
            if (statusPill) {
                statusPill.textContent = status.replace('_', ' ').toUpperCase();
            }
        }
    </script>
</body>
</html>
